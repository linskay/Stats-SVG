name: Release

on:
  push:
    branches:
      - main
  # Manual runs never publish: they validate the semantic-release setup in dry-run mode.
  workflow_dispatch:
    inputs:
      validate:
        description: Validate the release configuration without publishing.
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Publish release
        if: github.event_name == 'push'
        run: npx --no-install semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Validate release configuration
        if: github.event_name == 'workflow_dispatch'
        run: npx --no-install semantic-release --dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
